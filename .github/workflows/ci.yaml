name: CI Pipeline

on: [push]

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: 10603/nestjs-blog-api:latest

            - name: Deploy to EC2 via SSM
              run: |
                  aws ssm send-command \
                    --region us-east-1 \
                    --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
                    --document-name "AWS-RunShellScript" \
                    --comment "Deploy latest Docker image" \
                    --parameters 'commands=[
                      "echo \"${{ secrets.DOCKERHUB_TOKEN }}\" | docker login -u \"${{ vars.DOCKERHUB_USERNAME }}\" --password-stdin",
                      "cd /home/ubuntu/nestjs-blog-api",
                      "docker pull 10603/nestjs-blog-api:latest",
                      "docker stack deploy --resolve-image always -c docker-compose.prod.yml blog"
                    ]'
